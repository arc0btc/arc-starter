<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent - Identity</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body>

  <div id="sse-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-identity">
        <img class="avatar avatar-img" id="header-avatar" src="/api/face" alt="this is my dashboard" title="this is my dashboard" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="avatar avatar-fallback" id="header-avatar-fallback" style="display:none" title="this is my dashboard">A</div>
        <div>
          <h1 class="header-name" id="header-name">Agent <span class="status-dot live" id="status-dot" title="Live" aria-label="Status: live"></span><span class="sse-status disconnected" id="sse-dot" title="SSE disconnected" aria-label="SSE: disconnected"></span></h1>
          <div class="header-bns" id="header-bns"></div>
        </div>
      </div>

      <div class="header-stats">
        <div class="cost-ticker">
          <div class="label">Cost Today</div>
          <span id="cost-today">$0.00</span>
        </div>
      </div>

      <nav class="header-nav">
        <a href="/">Activity</a>
        <a href="/sensors">Sensors</a>
        <a href="/skills">Skills</a>
        <a href="/identity" class="active">Identity</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container" style="grid-template-columns:1fr;max-width:900px">

    <!-- Identity Card -->
    <section id="identity" class="section">
      <div class="section-header">
        <h2 class="section-title">Identity</h2>
      </div>
      <div class="identity-card" id="identity-card">
        <p class="placeholder">Loading identity...</p>
      </div>
    </section>

    <!-- Reputation -->
    <section id="reputation" class="section">
      <div class="section-header">
        <h2 class="section-title">Reputation</h2>
      </div>
      <div id="reputation-content">
        <p class="placeholder">Loading reputation data...</p>
      </div>
    </section>

  </main>

  <!-- Floating Message Box -->
  <div class="message-float">
    <div class="message-box">
      <form class="message-form" id="message-form">
        <textarea class="message-input" id="message-input" placeholder="Send a task..." rows="1" maxlength="1000" aria-label="Send a task"></textarea>
        <button type="submit" class="message-send" id="message-send">Send</button>
      </form>
      <div class="message-status" id="message-status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner" id="footer-inner">
      <span>Agent v5</span>
      <span class="footer-dot"></span>
      <span id="uptime">--</span>
    </div>
  </footer>

  <script src="/shared.js"></script>
  <script>
    // ---- Identity ----

    function renderIdentity(identity) {
      var card = document.getElementById('identity-card');

      var addrRows = [
        { label: 'L1 (segwit)', value: identity.btc_segwit || identity.btc, explorer: 'https://mempool.space/address/' + (identity.btc_segwit || identity.btc) },
      ];
      if (identity.btc_taproot) {
        addrRows.push({ label: 'L1 (taproot)', value: identity.btc_taproot, explorer: 'https://mempool.space/address/' + identity.btc_taproot });
      }
      addrRows.push({ label: 'L2 (stacks)', value: identity.stx, explorer: 'https://explorer.hiro.so/address/' + identity.stx });

      var rowsHtml = addrRows.map(function(r) {
        return '<div class="identity-row">'
          + '<span class="identity-label">' + r.label + '</span>'
          + '<span class="identity-value">' + esc(r.value) + '</span>'
          + '<button class="copy-btn" data-copy="' + escAttr(r.value) + '">copy</button>'
          + '<a href="' + escAttr(r.explorer) + '" target="_blank" rel="noopener" class="explorer-btn" title="View on explorer">explorer</a>'
          + '</div>';
      }).join('');

      var linksHtml = '';
      if (identity.website || identity.github || identity.twitter) {
        linksHtml = '<div class="identity-links">';
        if (identity.website) linksHtml += '<a href="https://' + escAttr(identity.website) + '" target="_blank" rel="noopener">' + esc(identity.website) + '</a>';
        if (identity.github) linksHtml += '<a href="https://github.com/' + escAttr(identity.github) + '" target="_blank" rel="noopener">GitHub</a>';
        if (identity.twitter) linksHtml += '<a href="https://x.com/' + escAttr(identity.twitter) + '" target="_blank" rel="noopener">@' + esc(identity.twitter) + '</a>';
        linksHtml += '</div>';
      }

      card.innerHTML = rowsHtml + linksHtml;
    }

    // ---- Reputation ----

    function renderReputation(data) {
      var el = document.getElementById('reputation-content');
      if (!el) return;

      var submitted = data.submitted || { count: 0, recent: [] };
      var received = data.received || { count: 0, avg_rating: null, recent: [] };

      var stxExplorer = 'https://explorer.hiro.so/address/' + encodeURIComponent(data.stx_address) + '?chain=mainnet';
      var btcExplorer = 'https://mempool.space/address/' + encodeURIComponent(data.btc_address);

      var html = '<div class="metrics-grid" style="margin-bottom:var(--space-sm)">'
        + '<div class="metric-card"><div class="metric-value">' + submitted.count + '</div><div class="metric-label">Reviews Submitted</div></div>'
        + '<div class="metric-card"><div class="metric-value">' + received.count + '</div><div class="metric-label">Reviews Received</div></div>'
        + (received.avg_rating !== null ? '<div class="metric-card"><div class="metric-value">' + received.avg_rating.toFixed(1) + '/5</div><div class="metric-label">Avg Rating</div></div>' : '')
        + '</div>';

      html += '<div class="reputation-links">'
        + '<span style="color:var(--text-muted);font-size:0.85rem">Verify on-chain:</span>'
        + ' <a href="' + escAttr(stxExplorer) + '" target="_blank" rel="noopener" class="explorer-btn">ERC-8004 (Stacks)</a>'
        + ' <a href="' + escAttr(btcExplorer) + '" target="_blank" rel="noopener" class="explorer-btn">BIP-322 (Bitcoin)</a>'
        + '</div>';

      function reviewRows(reviews, addrField, addrLabel) {
        return reviews.map(function(r) {
          var stars = String.fromCharCode(9733).repeat(r.rating) + String.fromCharCode(9734).repeat(5 - r.rating);
          var tags = Array.isArray(r.tags) ? r.tags.map(function(t) { return '<span class="pill pill-muted">' + esc(t) + '</span>'; }).join(' ') : '';
          var addr = r[addrField] || '';
          return '<li class="reputation-item">'
            + '<span class="reputation-stars">' + stars + '</span>'
            + '<span class="reputation-subject">' + esc(r.subject) + '</span>'
            + (tags ? ' ' + tags : '')
            + '<span class="reputation-meta">' + addrLabel + ' ' + esc(addr.slice(0, 14)) + (addr.length > 14 ? '...' : '') + ' · ' + relativeTime(r.created_at) + '</span>'
            + '</li>';
        }).join('');
      }

      if (received.recent && received.recent.length > 0) {
        html += '<div class="reputation-section-label">Received</div><ul class="reputation-list">' + reviewRows(received.recent, 'reviewer_address', 'from') + '</ul>';
      }

      if (submitted.recent && submitted.recent.length > 0) {
        html += '<div class="reputation-section-label">Submitted</div><ul class="reputation-list">' + reviewRows(submitted.recent, 'reviewee_address', 'for') + '</ul>';
      }

      if (submitted.count === 0 && received.count === 0) {
        html += '<p class="placeholder" style="margin-top:var(--space-sm)">No reviews yet</p>';
      }

      el.innerHTML = html;
    }

    // ---- Init ----

    async function init() {
      loadIdentity('Identity');
      try {
        var results = await Promise.allSettled([
          fetchJSON('/api/status'),
          fetchJSON('/api/identity'),
          fetchJSON('/api/reputation'),
        ]);

        var status     = results[0].status === 'fulfilled' ? results[0].value : null;
        var identity   = results[1].status === 'fulfilled' ? results[1].value : null;
        var reputation = results[2].status === 'fulfilled' ? results[2].value : null;

        if (status) updateHeader(status);
        if (identity) renderIdentity(identity);
        if (reputation) renderReputation(reputation);
      } catch (e) {
        console.error('Identity page init error:', e);
      }

      initMessageBox();
      connectSSE();
    }

    init();
  </script>
</body>
</html>
