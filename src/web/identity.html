<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent - Identity</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body>

  <div id="sse-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-identity">
        <img class="avatar avatar-img" id="header-avatar" src="/api/face" alt="this is my dashboard" title="this is my dashboard" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="avatar avatar-fallback" id="header-avatar-fallback" style="display:none" title="this is my dashboard">A</div>
        <div>
          <h1 class="header-name" id="header-name">Agent <span class="status-dot live" id="status-dot" title="Live" aria-label="Status: live"></span><span class="sse-status disconnected" id="sse-dot" title="SSE disconnected" aria-label="SSE: disconnected"></span></h1>
          <div class="header-bns" id="header-bns"></div>
        </div>
      </div>

      <div class="header-stats">
        <div class="cost-ticker">
          <div class="label">Cost Today</div>
          <span id="cost-today">$0.00</span>
        </div>
      </div>

      <nav class="header-nav">
        <a href="/">Activity</a>
        <a href="/sensors">Sensors</a>
        <a href="/skills">Skills</a>
        <a href="/email">Email</a>
        <a href="/identity" class="active">Identity</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container" style="grid-template-columns:1fr;max-width:900px">

    <!-- Identity Card -->
    <section id="identity" class="section">
      <div class="section-header">
        <h2 class="section-title">Identity</h2>
      </div>
      <div class="identity-card" id="identity-card">
        <p class="placeholder">Loading identity...</p>
      </div>
    </section>

    <!-- Reputation -->
    <section id="reputation" class="section">
      <div class="section-header">
        <h2 class="section-title">Reputation</h2>
      </div>

      <div id="reputation-metrics">
        <p class="placeholder">Loading reputation data...</p>
      </div>

      <div class="rep-filters">
        <div class="rep-filter-group">
          <label for="rep-filter-type" class="rep-filter-label">Type</label>
          <select id="rep-filter-type" class="rep-filter-select">
            <option value="all">All Reviews</option>
            <option value="received">Received</option>
            <option value="submitted">Submitted</option>
          </select>
        </div>
        <div class="rep-filter-group">
          <label for="rep-filter-agent" class="rep-filter-label">Agent Address</label>
          <input id="rep-filter-agent" class="rep-filter-input" type="text" placeholder="Filter by address..." />
        </div>
      </div>

      <div id="reputation-table">
        <p class="placeholder">Loading reviews...</p>
      </div>
    </section>

  </main>

  <!-- Floating Message Box -->
  <div class="message-float">
    <div class="message-box">
      <form class="message-form" id="message-form">
        <textarea class="message-input" id="message-input" placeholder="Send a task..." rows="1" maxlength="1000" aria-label="Send a task"></textarea>
        <button type="submit" class="message-send" id="message-send">Send</button>
      </form>
      <div class="message-status" id="message-status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner" id="footer-inner">
      <span>Agent v5</span>
      <span class="footer-dot"></span>
      <span id="uptime">--</span>
    </div>
  </footer>

  <script src="/shared.js"></script>
  <script>
    // ---- Identity ----

    function renderIdentity(identity) {
      var card = document.getElementById('identity-card');

      var addrRows = [
        { label: 'L1 (segwit)', value: identity.btc_segwit || identity.btc, explorer: 'https://mempool.space/address/' + (identity.btc_segwit || identity.btc) },
      ];
      if (identity.btc_taproot) {
        addrRows.push({ label: 'L1 (taproot)', value: identity.btc_taproot, explorer: 'https://mempool.space/address/' + identity.btc_taproot });
      }
      addrRows.push({ label: 'L2 (stacks)', value: identity.stx, explorer: 'https://explorer.hiro.so/address/' + identity.stx });

      var rowsHtml = addrRows.map(function(r) {
        return '<div class="identity-row">'
          + '<span class="identity-label">' + r.label + '</span>'
          + '<span class="identity-value">' + esc(r.value) + '</span>'
          + '<button class="copy-btn" data-copy="' + escAttr(r.value) + '">copy</button>'
          + '<a href="' + escAttr(r.explorer) + '" target="_blank" rel="noopener" class="explorer-btn" title="View on explorer">explorer</a>'
          + '</div>';
      }).join('');

      var linksHtml = '';
      if (identity.website || identity.brand_site || identity.github || identity.twitter) {
        linksHtml = '<div class="identity-links">';
        if (identity.website) linksHtml += '<a href="https://' + escAttr(identity.website) + '" target="_blank" rel="noopener">' + esc(identity.website) + '</a>';
        if (identity.brand_site) linksHtml += '<a href="https://' + escAttr(identity.brand_site) + '" target="_blank" rel="noopener">' + esc(identity.brand_site) + '</a>';
        if (identity.github) linksHtml += '<a href="https://github.com/' + escAttr(identity.github) + '" target="_blank" rel="noopener">GitHub</a>';
        if (identity.twitter) linksHtml += '<a href="https://x.com/' + escAttr(identity.twitter) + '" target="_blank" rel="noopener">@' + esc(identity.twitter) + '</a>';
        linksHtml += '</div>';
      }

      card.innerHTML = rowsHtml + linksHtml;
    }

    // ---- Reputation ----

    var repState = { type: 'all', agent: '', limit: 10, offset: 0 };

    function renderReputationMetrics(data) {
      var stxExplorer = 'https://explorer.hiro.so/address/' + encodeURIComponent(data.stx_address) + '?chain=mainnet';
      var btcExplorer = 'https://mempool.space/address/' + encodeURIComponent(data.btc_address);

      var metricsEl = document.getElementById('reputation-metrics');
      if (!metricsEl) return;

      metricsEl.innerHTML = '<div class="metrics-grid">'
        + '<div class="metric-card"><div class="metric-value">' + (data.submitted_total || 0) + '</div><div class="metric-label">Reviews Submitted</div></div>'
        + '<div class="metric-card"><div class="metric-value">' + (data.received_total || 0) + '</div><div class="metric-label">Reviews Received</div></div>'
        + (data.avg_rating !== null ? '<div class="metric-card"><div class="metric-value">' + data.avg_rating.toFixed(1) + '/5</div><div class="metric-label">Avg Rating</div></div>' : '')
        + '</div>'
        + '<div class="reputation-links">'
        + '<span style="color:var(--text-muted);font-size:0.85rem">Verify on-chain:</span>'
        + ' <a href="' + escAttr(stxExplorer) + '" target="_blank" rel="noopener" class="explorer-btn">ERC-8004 on L2 (Stacks)</a>'
        + ' <a href="' + escAttr(btcExplorer) + '" target="_blank" rel="noopener" class="explorer-btn">BIP-322 on L1 (Bitcoin)</a>'
        + '</div>';
    }

    function renderReputationTable(data) {
      var tableEl = document.getElementById('reputation-table');
      if (!tableEl) return;

      var reviews = data.reviews || [];

      if (reviews.length === 0) {
        tableEl.innerHTML = '<p class="placeholder" style="margin-top:var(--space-sm)">No reviews match current filters</p>';
        return;
      }

      var html = '<table class="rep-table">'
        + '<thead><tr>'
        + '<th class="rep-th-type">Type</th>'
        + '<th class="rep-th-rating">Rating</th>'
        + '<th class="rep-th-subject">Subject</th>'
        + '<th class="rep-th-agent">Agent</th>'
        + '<th class="rep-th-tags">Tags</th>'
        + '<th class="rep-th-date">Date</th>'
        + '</tr></thead><tbody>';

      reviews.forEach(function(r) {
        var stars = String.fromCharCode(9733).repeat(r.rating) + String.fromCharCode(9734).repeat(5 - r.rating);
        var tags = Array.isArray(r.tags) ? r.tags.map(function(t) { return '<span class="pill pill-muted">' + esc(t) + '</span>'; }).join(' ') : '';
        var counterparty = r.direction === 'received' ? r.reviewer_address : r.reviewee_address;
        var shortAddr = counterparty.slice(0, 10) + (counterparty.length > 10 ? '...' : '');
        var addrNetwork = counterparty.startsWith('SP') || counterparty.startsWith('ST') ? 'L2' : 'L1';
        var dirClass = r.direction === 'received' ? 'rep-dir-received' : 'rep-dir-submitted';

        html += '<tr>'
          + '<td><span class="rep-direction ' + dirClass + '">' + (r.direction === 'received' ? 'Received' : 'Submitted') + '</span></td>'
          + '<td class="reputation-stars">' + stars + '</td>'
          + '<td class="rep-subject-cell">' + esc(r.subject) + '</td>'
          + '<td class="rep-agent-cell" title="' + escAttr(counterparty) + '"><span class="rep-agent-network">' + addrNetwork + '</span> ' + esc(shortAddr) + '</td>'
          + '<td class="rep-tags-cell">' + (tags || '<span class="text-muted">--</span>') + '</td>'
          + '<td class="rep-date-cell">' + relativeTime(r.created_at) + '</td>'
          + '</tr>';
      });

      html += '</tbody></table>';

      // Pagination
      var totalItems = data.total || 0;
      if (totalItems > repState.limit) {
        var currentPage = Math.floor(repState.offset / repState.limit) + 1;
        var totalPages = Math.ceil(totalItems / repState.limit);
        html += '<div class="rep-pagination">'
          + '<button class="rep-page-btn" id="rep-prev" ' + (currentPage <= 1 ? 'disabled' : '') + '>Prev</button>'
          + '<span class="rep-page-info">Page ' + currentPage + ' of ' + totalPages + '</span>'
          + '<button class="rep-page-btn" id="rep-next" ' + (currentPage >= totalPages ? 'disabled' : '') + '>Next</button>'
          + '</div>';
      }

      tableEl.innerHTML = html;

      // Bind pagination
      var prevBtn = document.getElementById('rep-prev');
      var nextBtn = document.getElementById('rep-next');
      if (prevBtn) prevBtn.onclick = function() { repState.offset = Math.max(0, repState.offset - repState.limit); loadReputation(); };
      if (nextBtn) nextBtn.onclick = function() { repState.offset += repState.limit; loadReputation(); };
    }

    function loadReputation() {
      var params = '?limit=' + repState.limit + '&offset=' + repState.offset;
      if (repState.type !== 'all') params += '&type=' + repState.type;
      if (repState.agent) params += '&agent=' + encodeURIComponent(repState.agent);

      fetchJSON('/api/reputation' + params).then(function(data) {
        renderReputationMetrics(data);
        renderReputationTable(data);
      }).catch(function(e) {
        console.error('Failed to load reputation:', e);
      });
    }

    function initReputationFilters() {
      var typeSelect = document.getElementById('rep-filter-type');
      var agentInput = document.getElementById('rep-filter-agent');

      if (typeSelect) {
        typeSelect.onchange = function() {
          repState.type = typeSelect.value;
          repState.offset = 0;
          loadReputation();
        };
      }

      if (agentInput) {
        agentInput.oninput = debounce(function() {
          repState.agent = agentInput.value.trim();
          repState.offset = 0;
          loadReputation();
        }, 400);
      }
    }

    // ---- Init ----

    async function init() {
      loadIdentity('Identity');
      try {
        var results = await Promise.allSettled([
          fetchJSON('/api/status'),
          fetchJSON('/api/identity'),
          fetchJSON('/api/reputation?limit=10'),
        ]);

        var status     = results[0].status === 'fulfilled' ? results[0].value : null;
        var identity   = results[1].status === 'fulfilled' ? results[1].value : null;
        var reputation = results[2].status === 'fulfilled' ? results[2].value : null;

        if (status) updateHeader(status);
        if (identity) renderIdentity(identity);
        if (reputation) {
          renderReputationMetrics(reputation);
          renderReputationTable(reputation);
        }
      } catch (e) {
        console.error('Identity page init error:', e);
      }

      initReputationFilters();
      initMessageBox();
      connectSSE();
    }

    init();
  </script>
</body>
</html>
