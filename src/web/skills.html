<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent - Skills</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .skill-grid {
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
      .skill-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .skill-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .skill-card {
      padding: var(--space-md) var(--space-lg);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .skill-card:hover {
      background: #111;
      border-left-color: var(--accent);
    }

    .skill-card-top {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xs);
    }

    .skill-card-name {
      font-size: 0.85rem;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .skill-card-caps {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: var(--space-sm);
    }

    .skill-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--border);
    }

    .skill-usage {
      font-variant-numeric: tabular-nums;
    }

    .skill-msg-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .skill-msg-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .skills-search {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.85rem;
      padding: var(--space-xs) var(--space-md);
      border-radius: 2px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
      margin-bottom: var(--space-md);
    }
    .skills-search:focus { border-color: var(--accent); }
    .skills-search::placeholder { color: #555; }

    .skills-filter-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: var(--space-md);
    }
  </style>
</head>
<body>

  <div id="sse-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-identity">
        <img class="avatar avatar-img" id="header-avatar" src="/api/face" alt="this is my dashboard" title="this is my dashboard" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="avatar avatar-fallback" id="header-avatar-fallback" style="display:none" title="this is my dashboard">A</div>
        <div>
          <h1 class="header-name" id="header-name">Agent <span class="status-dot live" id="status-dot" title="Live" aria-label="Status: live"></span><span class="sse-status disconnected" id="sse-dot" title="SSE disconnected" aria-label="SSE: disconnected"></span></h1>
          <div class="header-bns" id="header-bns"></div>
        </div>
      </div>

      <div class="header-stats">
        <div class="cost-ticker">
          <div class="label">Cost Today</div>
          <span id="cost-today">$0.00</span>
        </div>
      </div>

      <nav class="header-nav">
        <a href="/">Activity</a>
        <a href="/sensors">Sensors</a>
        <a href="/skills" class="active">Skills</a>
        <a href="/email">Email</a>
        <a href="/identity">Identity</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <!-- Skill Catalog -->
    <section id="skills" class="section">
      <div class="section-header">
        <h2 class="section-title">Skills</h2>
        <span class="section-count" id="skill-count"></span>
      </div>

      <input class="skills-search" type="search" id="skills-search" placeholder="Search skills by name, description, or tag..." autocomplete="off" aria-label="Search skills">

      <div class="skills-filter-row" id="skills-filters" role="group" aria-label="Filter by capability">
        <button class="filter-tab active" data-cap="" aria-pressed="true">All</button>
        <button class="filter-tab" data-cap="sensor" aria-pressed="false">Sensor</button>
        <button class="filter-tab" data-cap="cli" aria-pressed="false">CLI</button>
        <button class="filter-tab" data-cap="agent" aria-pressed="false">Agent</button>
      </div>

      <div class="skill-grid" id="skill-grid">
        <div class="skill-card">
          <div class="skill-card-name">Loading...</div>
          <div class="skill-card-desc">Discovering installed skills</div>
        </div>
      </div>
    </section>

  </main>

  <!-- Floating Message Box -->
  <div class="message-float">
    <div class="message-box">
      <form class="message-form" id="message-form">
        <textarea class="message-input" id="message-input" placeholder="Send a task..." rows="1" maxlength="1000" aria-label="Send a task"></textarea>
        <button type="submit" class="message-send" id="message-send">Send</button>
      </form>
      <div class="message-status" id="message-status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <span id="footer-links"></span>
      <span>Agent v5</span>
      <span class="footer-dot"></span>
      <span id="uptime">--</span>
    </div>
  </footer>

  <script src="/shared.js"></script>
  <script>
    var allSkills = [];
    var currentSearch = '';
    var currentCap = '';

    function filterSkills() {
      var q = currentSearch.toLowerCase();
      return allSkills.filter(function(s) {
        // Capability filter
        if (currentCap === 'sensor' && !s.has_sensor) return false;
        if (currentCap === 'cli' && !s.has_cli) return false;
        if (currentCap === 'agent' && !s.has_agent) return false;

        // Text search
        if (!q) return true;
        if (s.name.toLowerCase().indexOf(q) !== -1) return true;
        if ((s.description || '').toLowerCase().indexOf(q) !== -1) return true;
        var tags = s.tags || [];
        for (var i = 0; i < tags.length; i++) {
          if (tags[i].toLowerCase().indexOf(q) !== -1) return true;
        }
        return false;
      });
    }

    function renderSkills(skills) {
      var grid = document.getElementById('skill-grid');
      var count = document.getElementById('skill-count');
      count.textContent = skills.length + ' skill' + (skills.length !== 1 ? 's' : '');

      if (skills.length === 0) {
        grid.innerHTML = '<p class="placeholder">No skills found</p>';
        return;
      }

      grid.innerHTML = skills.map(function(s) {
        var tags = (s.tags || []).map(function(t) {
          return '<span class="skill-tag">' + esc(t) + '</span>';
        }).join('');

        var caps = '';
        if (s.has_sensor) caps += '<span class="skill-badge">sensor</span>';
        if (s.has_cli) caps += '<span class="skill-badge">cli</span>';
        if (s.has_agent) caps += '<span class="skill-badge">agent</span>';

        var usageText = s.usage_count === 1 ? '1 task' : (s.usage_count || 0) + ' tasks';

        return '<div class="skill-card" data-skill-name="' + escAttr(s.name) + '" tabindex="0" role="button">'
          + '<div class="skill-card-top">'
          + '<span class="skill-card-name">' + esc(s.name) + '</span>'
          + '</div>'
          + '<div class="skill-card-desc">' + (s.description ? esc(s.description) : '<em>No description</em>') + '</div>'
          + '<div class="skill-card-caps">' + caps + tags + '</div>'
          + '<div class="skill-card-meta">'
          + '<span class="skill-usage">' + usageText + '</span>'
          + '<button class="skill-msg-btn" data-skill-name="' + escAttr(s.name) + '">Message about skill</button>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    sseCallbacks.onRefreshAll = function() {
      fetchJSON('/api/status').then(function(s) {
        updateHeader(s);
      }).catch(function() {});
    };

    async function init() {
      loadIdentity('Skills');
      try {
        var results = await Promise.allSettled([
          fetchJSON('/api/status'),
          fetchJSON('/api/skills'),
        ]);

        var status = results[0].status === 'fulfilled' ? results[0].value : null;
        var skills = results[1].status === 'fulfilled' ? results[1].value : null;

        if (status) updateHeader(status);
        if (skills) {
          allSkills = (skills.skills || []).sort(function(a, b) {
            return b.usage_count - a.usage_count || a.name.localeCompare(b.name);
          });
          renderSkills(allSkills);
        }
      } catch (e) {
        console.error('Skills init error:', e);
      }

      // Search
      var searchInput = document.getElementById('skills-search');
      var debouncedSearch = debounce(function() {
        currentSearch = searchInput.value.trim();
        renderSkills(filterSkills());
      }, 200);
      searchInput.addEventListener('input', debouncedSearch);

      // Capability filter tabs
      var filtersEl = document.getElementById('skills-filters');
      filtersEl.addEventListener('click', function(e) {
        var btn = e.target.closest('.filter-tab');
        if (!btn) return;
        currentCap = btn.getAttribute('data-cap');
        filtersEl.querySelectorAll('.filter-tab').forEach(function(t) {
          t.classList.toggle('active', t === btn);
          t.setAttribute('aria-pressed', t === btn ? 'true' : 'false');
        });
        renderSkills(filterSkills());
      });

      // Skill grid clicks → prefill message (event delegation; avoids JS-in-attr injection)
      document.getElementById('skill-grid').addEventListener('click', function(e) {
        var btn = e.target.closest('.skill-msg-btn');
        if (btn) {
          e.stopPropagation();
          var name = btn.getAttribute('data-skill-name') || '';
          prefillMessage('re: skill:' + name + ' \u2014 ');
          return;
        }
        var card = e.target.closest('.skill-card');
        if (card) {
          var name = card.getAttribute('data-skill-name') || '';
          prefillMessage('Run skill: ' + name);
        }
      });

      // Keyboard nav for skill cards
      document.getElementById('skill-grid').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          var card = e.target.closest('.skill-card');
          if (card) { e.preventDefault(); card.click(); }
        }
      });

      initMessageBox();
      connectSSE();
      setInterval(sseCallbacks.onRefreshAll, 60000);
    }

    init();
  </script>
</body>
</html>
