<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent - Sensors</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    .sensor-grid {
      grid-template-columns: 1fr;
    }
    @media (min-width: 640px) {
      .sensor-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .sensor-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .sensor-card {
      padding: var(--space-md) var(--space-lg);
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .sensor-card:hover {
      background: #111;
      border-left-color: var(--accent);
    }

    .sensor-card-top {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .sensor-card-name {
      font-size: 0.85rem;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sensor-card-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sensor-card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-xs) var(--space-sm);
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
    }

    .sensor-meta-label {
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-size: 0.6rem;
      color: #555;
    }

    .sensor-meta-value {
      font-variant-numeric: tabular-nums;
    }

    .sensor-result-ok { color: var(--success); }
    .sensor-result-error { color: var(--error); }
    .sensor-result-skip { color: var(--text-muted); }

    .sensor-failures { color: var(--error); font-weight: 600; }

    .sensor-grid-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-lg);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <div id="sse-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-identity">
        <img class="avatar avatar-img" src="/api/face" alt="this is my dashboard" title="this is my dashboard" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="avatar avatar-fallback" style="display:none" title="this is my dashboard">A</div>
        <div>
          <h1 class="header-name">Agent <span class="status-dot live" id="status-dot" title="Live" aria-label="Status: live"></span><span class="sse-status disconnected" id="sse-dot" title="SSE disconnected" aria-label="SSE: disconnected"></span></h1>
          <div class="header-bns"></div>
        </div>
      </div>

      <div class="header-stats">
        <div class="cost-ticker">
          <div class="label">Cost Today</div>
          <span id="cost-today">$0.00</span>
        </div>
      </div>

      <nav class="header-nav">
        <a href="/">Activity</a>
        <a href="/sensors" class="active">Sensors</a>
        <a href="/sensors/schedule">Schedule</a>
        <a href="/skills">Skills</a>
        <a href="/email">Email</a>
        <a href="/identity">Identity</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <!-- Sensor Grid -->
    <section id="sensors" class="section">
      <div class="section-header">
        <h2 class="section-title">Sensors</h2>
        <span class="section-count" id="sensor-count"></span>
      </div>
      <div class="feed-filters">
        <input class="feed-search" type="search" id="sensor-search" placeholder="Search sensors..." autocomplete="off" aria-label="Search sensors">
        <div class="filter-tabs" id="sensor-filter-tabs" role="group" aria-label="Filter by status">
          <button class="filter-tab active" data-filter="all" aria-pressed="true">All</button>
          <button class="filter-tab" data-filter="ok" aria-pressed="false">Active</button>
          <button class="filter-tab" data-filter="stale" aria-pressed="false">Stale</button>
          <button class="filter-tab" data-filter="error" aria-pressed="false">Error</button>
        </div>
      </div>
      <div class="sensor-grid" id="sensor-grid">
        <div class="sensor-card ok">
          <div class="sensor-card-top">
            <span class="status-dot live" aria-hidden="true"></span>
            <span class="sensor-card-name">Loading...</span>
          </div>
          <div class="sensor-card-desc">Discovering sensors</div>
        </div>
      </div>
    </section>

  </main>

  <!-- Floating Message Box -->
  <div class="message-float">
    <div class="message-box">
      <form class="message-form" id="message-form">
        <textarea class="message-input" id="message-input" placeholder="Send a task..." rows="1" maxlength="1000" aria-label="Send a task"></textarea>
        <button type="submit" class="message-send" id="message-send">Send</button>
      </form>
      <div class="message-status" id="message-status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <span id="footer-links"></span>
      <span>Agent v5</span>
      <span class="footer-dot"></span>
      <span id="uptime">--</span>
    </div>
  </footer>

  <script src="/shared.js"></script>
  <script>
    var allSensors = [];
    var sensorFilter = 'all';
    var sensorSearch = '';

    function getSensorStatus(s) {
      var isError = s.last_result === 'error' || (s.consecutive_failures && s.consecutive_failures > 0);
      if (isError) return 'error';
      if (s.last_ran) {
        var age = Date.now() - new Date(s.last_ran.endsWith('Z') ? s.last_ran : s.last_ran + 'Z').getTime();
        var threshold = (s.interval_minutes || 5) * 2 * 60000;
        if (age < threshold) return 'ok';
      }
      return 'stale';
    }

    function filterSensors(sensors) {
      return sensors.filter(function(s) {
        if (sensorSearch && s.name.toLowerCase().indexOf(sensorSearch.toLowerCase()) === -1
            && (!s.description || s.description.toLowerCase().indexOf(sensorSearch.toLowerCase()) === -1)) {
          return false;
        }
        if (sensorFilter !== 'all' && getSensorStatus(s) !== sensorFilter) return false;
        return true;
      });
    }

    function renderSensors(sensors) {
      allSensors = sensors;
      var filtered = filterSensors(sensors);
      var grid = document.getElementById('sensor-grid');
      var count = document.getElementById('sensor-count');
      count.textContent = filtered.length + ' of ' + sensors.length + ' sensors';

      // Update filter tab counts
      var counts = { all: sensors.length, ok: 0, stale: 0, error: 0 };
      sensors.forEach(function(s) { counts[getSensorStatus(s)]++; });
      var tabs = document.querySelectorAll('#sensor-filter-tabs .filter-tab');
      tabs.forEach(function(tab) {
        var f = tab.getAttribute('data-filter');
        var c = counts[f] != null ? counts[f] : 0;
        var label = tab.textContent.replace(/\s*\(\d+\)/, '');
        tab.textContent = label + ' (' + c + ')';
      });

      if (filtered.length === 0) {
        var emptyMsg = 'No sensors found';
        if (sensorFilter === 'error') emptyMsg = 'No sensors with errors';
        else if (sensorFilter === 'stale') emptyMsg = 'No stale sensors';
        else if (sensorFilter === 'ok') emptyMsg = 'No active sensors';
        grid.innerHTML = '<div class="sensor-grid-empty">' + emptyMsg + '</div>';
        return;
      }

      grid.innerHTML = filtered.map(function(s) {
        var isError = s.last_result === 'error' || (s.consecutive_failures && s.consecutive_failures > 0);
        var isRecent = false;
        if (s.last_ran) {
          var age = Date.now() - new Date(s.last_ran.endsWith('Z') ? s.last_ran : s.last_ran + 'Z').getTime();
          var threshold = (s.interval_minutes || 5) * 2 * 60000;
          isRecent = age < threshold;
        }
        var statusCls = isError ? 'error' : (isRecent ? 'ok' : 'stale');
        var dotCls = isError ? '' : (isRecent ? 'live' : '');
        var dotStyle = isError ? 'background:var(--error)' : (!isRecent ? 'background:#555' : '');
        var dotLabel = isError ? 'error' : (isRecent ? 'active' : 'stale');

        // Result display
        var resultCls = 'sensor-result-skip';
        var resultText = s.last_result || '--';
        if (s.last_result === 'ok' || s.last_result === 'skip') {
          resultCls = s.last_result === 'ok' ? 'sensor-result-ok' : 'sensor-result-skip';
        } else if (s.last_result === 'error') {
          resultCls = 'sensor-result-error';
        }

        // Failures
        var failuresHtml = '';
        if (s.consecutive_failures && s.consecutive_failures > 0) {
          failuresHtml = '<span class="sensor-failures">' + s.consecutive_failures + '</span>';
        } else {
          failuresHtml = '<span>0</span>';
        }

        var sensorName = esc(s.name);

        return '<div class="sensor-card ' + statusCls + '" data-sensor="' + escAttr(s.name) + '" tabindex="0" role="button">'
          + '<div class="sensor-card-top">'
          + '<span class="status-dot ' + dotCls + '" style="' + dotStyle + '" aria-label="Sensor status: ' + dotLabel + '"></span>'
          + '<span class="sensor-card-name">' + sensorName + '</span>'
          + (s.interval_minutes ? '<span class="skill-badge">' + s.interval_minutes + 'm</span>' : '')
          + (s.version != null ? '<span class="skill-badge">v' + s.version + '</span>' : '')
          + '</div>'
          + '<div class="sensor-card-desc">' + (s.description ? esc(s.description) : '<em>No description</em>') + '</div>'
          + '<div class="sensor-card-meta">'
          + '<div><span class="sensor-meta-label">Last ran</span><br><span class="sensor-meta-value">' + relativeTime(s.last_ran) + '</span></div>'
          + '<div><span class="sensor-meta-label">Result</span><br><span class="sensor-meta-value ' + resultCls + '">' + esc(resultText) + '</span></div>'
          + '<div><span class="sensor-meta-label">Interval</span><br><span class="sensor-meta-value">' + (s.interval_minutes ? s.interval_minutes + ' min' : '--') + '</span></div>'
          + '<div><span class="sensor-meta-label">Failures</span><br>' + failuresHtml + '</div>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    function pingSensor(name) {
      var cards = document.querySelectorAll('.sensor-card');
      for (var i = 0; i < cards.length; i++) {
        if (cards[i].getAttribute('data-sensor') === name) {
          var dot = cards[i].querySelector('.status-dot');
          if (dot) {
            dot.classList.remove('ping');
            void dot.offsetWidth;
            dot.classList.add('ping');
          }
          // Update last ran to "just now"
          var metaValues = cards[i].querySelectorAll('.sensor-meta-value');
          if (metaValues[0]) metaValues[0].textContent = 'just now';
          cards[i].className = cards[i].className.replace(/\b(error|stale)\b/g, '').trim();
          if (cards[i].className.indexOf('ok') === -1) cards[i].className += ' ok';
          break;
        }
      }
    }

    sseCallbacks.onSensorRan = function(data) {
      pingSensor(data.name);
    };

    sseCallbacks.onRefreshAll = function() {
      fetchJSON('/api/status').then(function(s) {
        updateHeader(s);
      }).catch(function() {});
      fetchJSON('/api/sensors').then(function(d) {
        renderSensors(d.sensors || []);
      }).catch(function() {});
    };

    async function init() {
      loadIdentity('Sensors');
      try {
        var results = await Promise.allSettled([
          fetchJSON('/api/status'),
          fetchJSON('/api/sensors'),
        ]);

        var status  = results[0].status === 'fulfilled' ? results[0].value : null;
        var sensors = results[1].status === 'fulfilled' ? results[1].value : null;

        if (status) updateHeader(status);
        if (sensors) renderSensors(sensors.sensors || []);
      } catch (e) {
        console.error('Sensors init error:', e);
      }

      // Sensor filter tabs
      var filterTabsEl = document.getElementById('sensor-filter-tabs');
      filterTabsEl.addEventListener('click', function(e) {
        var btn = e.target.closest('.filter-tab');
        if (!btn) return;
        sensorFilter = btn.getAttribute('data-filter');
        filterTabsEl.querySelectorAll('.filter-tab').forEach(function(t) {
          t.classList.toggle('active', t === btn);
          t.setAttribute('aria-pressed', t === btn ? 'true' : 'false');
        });
        renderSensors(allSensors);
      });

      // Sensor search
      var searchInput = document.getElementById('sensor-search');
      var debouncedSearch = debounce(function() {
        sensorSearch = searchInput.value.trim();
        renderSensors(allSensors);
      }, 300);
      searchInput.addEventListener('input', debouncedSearch);

      // Sensor card click → prefill message (event delegation; avoids JS-in-attr injection)
      document.getElementById('sensor-grid').addEventListener('click', function(e) {
        var card = e.target.closest('.sensor-card');
        if (!card) return;
        var name = card.getAttribute('data-sensor') || '';
        prefillMessage('re: sensor:' + name + ' \u2014 ');
      });

      // Keyboard nav for sensor cards
      document.getElementById('sensor-grid').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          var card = e.target.closest('.sensor-card');
          if (card) { e.preventDefault(); card.click(); }
        }
      });

      initMessageBox();
      connectSSE();
      setInterval(sseCallbacks.onRefreshAll, 60000);
    }

    init();
  </script>
</body>
</html>
