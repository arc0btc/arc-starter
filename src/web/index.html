<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent - Activity</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    @media (min-width: 768px) {
      .container {
        grid-template-columns: 1fr 1fr;
      }
      .span-full { grid-column: 1 / -1; }
    }

    @media (min-width: 1024px) {
      .container {
        grid-template-columns: 2fr 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="sse-announcer" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- Dispatch Gap Alert Banner -->
  <div id="dispatch-gap-banner" style="display:none; background:rgba(239,68,68,0.12); border-bottom:1px solid var(--error); padding:0.6rem 1.5rem; color:var(--error); font-size:0.875rem; align-items:center; gap:0.75rem; flex-wrap:wrap;">
    <span id="dispatch-gap-text" style="flex:1 1 auto;"></span>
    <button id="restart-btn" style="background:var(--error); color:#fff; border:none; border-radius:4px; padding:0.3rem 0.9rem; font-size:0.8rem; cursor:pointer; white-space:nowrap;" onclick="attemptRestart()">Attempt Restart</button>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-identity">
        <img class="avatar avatar-img" id="header-avatar" src="/api/face" alt="this is my dashboard" title="this is my dashboard" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
        <div class="avatar avatar-fallback" id="header-avatar-fallback" style="display:none" title="this is my dashboard">A</div>
        <div>
          <h1 class="header-name" id="header-name">Agent <span class="status-dot live" id="status-dot" title="Live" aria-label="Status: live"></span><span class="sse-status disconnected" id="sse-dot" title="SSE disconnected" aria-label="SSE: disconnected"></span></h1>
          <div class="header-bns" id="header-bns"></div>
        </div>
      </div>

      <div class="header-stats">
        <div class="cost-ticker">
          <div class="label">Cost Today</div>
          <span id="cost-today">$0.00</span>
        </div>
      </div>

      <nav class="header-nav">
        <a href="/" class="active">Activity</a>
        <a href="/sensors">Sensors</a>
        <a href="/skills">Skills</a>
        <a href="/email">Email</a>
        <a href="/identity">Identity</a>
        <a href="/voice">Voice</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <!-- Dispatch Metrics -->
    <section id="metrics" class="section">
      <div class="section-header">
        <h2 class="section-title">Dispatch Metrics</h2>
      </div>
      <div class="metrics-grid" id="metrics-grid">
        <div class="metric-card">
          <div class="metric-value" id="metric-pending">--</div>
          <div class="metric-label">Pending</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metric-active">--</div>
          <div class="metric-label">Active</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metric-completed">--</div>
          <div class="metric-label">Completed</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metric-failed">--</div>
          <div class="metric-label">Failed</div>
        </div>
      </div>

      <div class="metrics-grid" style="margin-top: var(--space-sm);">
        <div class="metric-card">
          <div class="metric-value" id="metric-cost">--</div>
          <div class="metric-label">Cost Today</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metric-uptime">--</div>
          <div class="metric-label">Uptime</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metric-duration">--</div>
          <div class="metric-label">Avg Duration</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="metric-last-cycle">--</div>
          <div class="metric-label">Last Cycle</div>
        </div>
      </div>
    </section>

    <!-- Hourly Cost -->
    <section id="cost-section" class="section">
      <div class="section-header">
        <h2 class="section-title">Hourly Cost</h2>
      </div>
      <div class="cost-bar-chart" id="cost-chart">
        <div id="cost-bars">
          <p class="placeholder">Loading cost data...</p>
        </div>
      </div>
    </section>

    <!-- Activity Feed -->
    <section id="feed" class="section span-full">
      <div class="section-header">
        <h2 class="section-title">Activity Feed</h2>
        <span class="section-count" id="feed-count"></span>
      </div>
      <div class="feed-filters">
        <input class="feed-search" type="search" id="feed-search" placeholder="Search tasks..." autocomplete="off" aria-label="Search tasks">
        <div class="filter-tabs" id="filter-tabs" role="group" aria-label="Filter by status">
          <button class="filter-tab active" data-status="" aria-pressed="true">All</button>
          <button class="filter-tab" data-status="pending" aria-pressed="false">Pending</button>
          <button class="filter-tab" data-status="active" aria-pressed="false">Active</button>
          <button class="filter-tab" data-status="completed" aria-pressed="false">Completed</button>
          <button class="filter-tab" data-status="failed" aria-pressed="false">Failed</button>
          <button class="filter-tab" data-status="blocked" aria-pressed="false">Blocked</button>
        </div>
      </div>
      <ul class="feed-list" id="feed-list">
        <li class="feed-item active">
          <span class="status-dot live" aria-hidden="true"></span>
          <div class="feed-body">
            <div class="feed-subject">Loading tasks...</div>
            <div class="feed-meta">
              <span class="pill badge-active">active</span>
            </div>
          </div>
        </li>
      </ul>
    </section>

  </main>

  <!-- Floating Message Box -->
  <div class="message-float">
    <div class="message-box">
      <form class="message-form" id="message-form">
        <textarea class="message-input" id="message-input" placeholder="Send a task..." rows="1" maxlength="1000" aria-label="Send a task"></textarea>
        <button type="submit" class="message-send" id="message-send">Send</button>
      </form>
      <div class="message-status" id="message-status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner" id="footer-inner">
      <span>Agent v5</span>
      <span class="footer-dot"></span>
      <span id="uptime">--</span>
    </div>
  </footer>

  <script src="/shared.js"></script>
  <script>
    // ---- Dispatch Gap Banner ----

    var DISPATCH_GAP_MS = 2 * 60 * 60 * 1000; // 2 hours

    function updateDispatchGapBanner(lastCycle) {
      var banner = document.getElementById('dispatch-gap-banner');
      var text = document.getElementById('dispatch-gap-text');
      var now = Date.now();
      var gapMs = lastCycle
        ? now - new Date(lastCycle.started_at + 'Z').getTime()
        : null;
      var showBanner = !lastCycle || gapMs > DISPATCH_GAP_MS;
      banner.style.display = showBanner ? 'flex' : 'none';
      if (showBanner) {
        var gapStr = !lastCycle ? 'no dispatch cycles recorded'
          : 'last cycle ' + relativeTime(lastCycle.started_at);
        text.textContent = 'Dispatch gap detected — ' + gapStr + '. Services may be stalled.';
      }
    }

    function attemptRestart() {
      var btn = document.getElementById('restart-btn');
      var text = document.getElementById('dispatch-gap-text');
      btn.disabled = true;
      btn.textContent = 'Restarting…';
      fetch('/api/restart', { method: 'POST' })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          if (data.ok) {
            text.textContent = 'Restart command sent. Services should resume shortly.';
            btn.textContent = 'Sent';
          } else {
            text.textContent = 'Restart failed: ' + (data.error || 'unknown error');
            btn.disabled = false;
            btn.textContent = 'Retry';
          }
        })
        .catch(function(e) {
          text.textContent = 'Restart request failed: ' + e.message;
          btn.disabled = false;
          btn.textContent = 'Retry';
        });
    }

    // ---- Feed Rendering ----

    var knownTaskIds = new Set();
    var currentFilter = '';
    var currentSearch = '';
    var currentOffset = 0;
    var PAGE_SIZE = 30;

    function buildTasksUrl(offset) {
      var params = new URLSearchParams();
      params.set('limit', String(PAGE_SIZE));
      params.set('offset', String(offset || 0));
      if (currentFilter) params.set('status', currentFilter);
      if (currentSearch) params.set('q', currentSearch);
      return '/api/tasks?' + params.toString();
    }

    function defaultModelForPriority(p) {
      if (p <= 4) return 'opus';
      if (p <= 7) return 'sonnet';
      return 'haiku';
    }

    function modelPill(model, priority) {
      var m = model || defaultModelForPriority(priority || 5);
      var isDefault = !model;
      var label = esc(m) + (isDefault ? '*' : '');
      return '<span class="pill pill-muted" title="' + (isDefault ? 'Default for P' + (priority || 5) : 'Explicit') + '">' + label + '</span>';
    }

    function buildFeedItemHTML(t) {
      var cls = statusBorderClass(t.status);
      var skills = '';
      try {
        var arr = typeof t.skills === 'string' ? JSON.parse(t.skills) : t.skills;
        if (arr && arr.length) skills = arr.map(function(s) { return '<span class="pill pill-muted">' + esc(s) + '</span>'; }).join(' ');
      } catch(e) {}

      var parentPill = t.parent_id
        ? ' <span class="pill pill-muted pill-thread" title="Child of #' + t.parent_id + '" onclick="jumpToTask(event,' + t.parent_id + ')">↳ #' + t.parent_id + '</span>'
        : '';

      return '<li class="feed-item ' + cls + (t.parent_id ? ' feed-item-child' : '') + '" tabindex="0" role="button" aria-expanded="false" onclick="toggleDetail(this)" onkeydown="handleFeedItemKey(event, this)" data-task-id-root="' + t.id + '">'
        + '<span class="status-dot ' + (t.status === 'active' ? 'live' : '') + '" style="margin-top:6px;'
        + (t.status === 'completed' ? 'background:var(--success)' : t.status === 'failed' ? 'background:var(--error)' : t.status === 'blocked' ? 'background:var(--blocked)' : '') + '" aria-hidden="true"></span>'
        + '<div class="feed-body">'
        + '<div class="feed-subject"><span class="task-id">#' + t.id + '</span> ' + esc(t.subject) + '</div>'
        + '<div class="feed-meta">'
        + '<span class="' + statusBadgeClass(t.status) + '">' + esc(t.status) + '</span>'
        + ' ' + modelPill(t.model, t.priority)
        + parentPill
        + (t.source ? ' <span class="pill pill-muted">' + esc(t.source) + '</span>' : '')
        + ' ' + skills
        + ' <span>' + relativeTime(t.created_at) + '</span>'
        + (t.cost_usd ? ' <span>' + formatCost(t.cost_usd) + '</span>' : '')
        + '</div>'
        + '<div class="feed-detail" data-task-id="' + t.id + '"><p class="placeholder">Loading...</p></div>'
        + '</div>'
        + '</li>';
    }

    function renderFeed(tasks, total, offset, append) {
      var list = document.getElementById('feed-list');
      var count = document.getElementById('feed-count');

      if (!append) {
        if (tasks.length === 0) {
          list.innerHTML = '<li class="placeholder">No tasks found</li>';
          renderPagination(0, 0, 0);
          return;
        }
        list.innerHTML = tasks.map(buildFeedItemHTML).join('');
      } else {
        var placeholder = list.querySelector('.placeholder');
        if (placeholder) list.innerHTML = '';
        tasks.forEach(function(t) {
          var temp = document.createElement('div');
          temp.innerHTML = buildFeedItemHTML(t);
          list.appendChild(temp.firstElementChild);
        });
      }

      var shown = list.querySelectorAll('.feed-item').length;
      count.textContent = shown + (total > shown ? ' of ' + total : '') + ' tasks';
      renderPagination(shown, total, offset);
    }

    function renderPagination(shown, total, offset) {
      var existing = document.getElementById('feed-pagination');
      if (existing) existing.remove();

      if (total <= shown + offset) return; // nothing more to load

      var nav = document.createElement('div');
      nav.id = 'feed-pagination';
      nav.className = 'feed-pagination';
      var remaining = total - (offset + shown);
      nav.innerHTML = '<button class="load-more-btn" onclick="loadMoreTasks()">Load ' + Math.min(PAGE_SIZE, remaining) + ' more <span class="pill pill-muted">' + remaining + ' remaining</span></button>';
      document.getElementById('feed-list').after(nav);
    }

    function loadMoreTasks() {
      currentOffset += PAGE_SIZE;
      fetchJSON(buildTasksUrl(currentOffset)).then(function(d) {
        var tasks = d.tasks || [];
        tasks.forEach(function(t) { knownTaskIds.add(t.id); });
        renderFeed(tasks, d.total || 0, currentOffset, true);
      }).catch(function() { currentOffset -= PAGE_SIZE; });
    }

    function toggleDetail(el) {
      var detail = el.querySelector('.feed-detail');
      if (!detail) return;

      var isOpen = detail.classList.contains('open');
      if (isOpen) {
        detail.classList.remove('open');
        el.setAttribute('aria-expanded', 'false');
        return;
      }

      if (detail.querySelector('.placeholder')) {
        var taskId = detail.getAttribute('data-task-id');
        Promise.all([
          fetchJSON('/api/tasks/' + taskId),
          fetchJSON('/api/tasks?parent_id=' + taskId + '&limit=20'),
        ]).then(function(results) {
          var task = results[0];
          var childrenData = results[1];
          var html = '';

          // Parent thread link
          if (task.parent_id) {
            html += '<div class="feed-detail-row feed-detail-thread"><span class="feed-detail-label">Parent</span><span class="feed-detail-value"><button class="thread-link" onclick="jumpToTask(event,' + task.parent_id + ')">↑ #' + task.parent_id + '</button></span></div>';
          }

          if (task.description) {
            html += '<div class="feed-detail-row"><span class="feed-detail-label">Desc</span><span class="feed-detail-value">' + esc(task.description) + '</span></div>';
          }
          if (task.result_summary) {
            html += '<div class="feed-detail-row"><span class="feed-detail-label">Result</span><span class="feed-detail-value">' + esc(task.result_summary) + '</span></div>';
          }
          if (task.cost_usd) {
            html += '<div class="feed-detail-row"><span class="feed-detail-label">Cost</span><span class="feed-detail-value">' + formatCost(task.cost_usd) + ' actual / ' + formatCost(task.api_cost_usd) + ' API est</span></div>';
          }
          if (task.started_at) {
            var dur = task.completed_at ? new Date(task.completed_at + 'Z').getTime() - new Date(task.started_at + 'Z').getTime() : null;
            html += '<div class="feed-detail-row"><span class="feed-detail-label">Duration</span><span class="feed-detail-value">' + formatDuration(dur) + '</span></div>';
          }
          if (task.tokens_in || task.tokens_out) {
            html += '<div class="feed-detail-row"><span class="feed-detail-label">Tokens</span><span class="feed-detail-value">' + formatNumber(task.tokens_in) + ' in / ' + formatNumber(task.tokens_out) + ' out</span></div>';
          }
          var detailModel = task.model || defaultModelForPriority(task.priority);
          var modelNote = task.model ? '' : ' (default)';
          html += '<div class="feed-detail-row"><span class="feed-detail-label">Model</span><span class="feed-detail-value">' + esc(detailModel) + modelNote + '</span></div>';
          html += '<div class="feed-detail-row"><span class="feed-detail-label">ID</span><span class="feed-detail-value">#' + task.id + ' &middot; P' + task.priority + '</span></div>';

          // Children list
          var children = (childrenData && childrenData.tasks) || [];
          if (children.length > 0) {
            html += '<div class="feed-detail-row feed-detail-children"><span class="feed-detail-label">Children</span><span class="feed-detail-value">';
            html += children.map(function(c) {
              return '<div class="child-task-row"><button class="thread-link" onclick="jumpToTask(event,' + c.id + ')">↳ #' + c.id + '</button>'
                + ' <span class="' + statusBadgeClass(c.status) + '">' + esc(c.status) + '</span>'
                + ' <span>' + esc(c.subject.slice(0, 60)) + '</span></div>';
            }).join('');
            if (childrenData.total > children.length) {
              html += '<div class="child-task-row" style="color:var(--muted)">… and ' + (childrenData.total - children.length) + ' more</div>';
            }
            html += '</span></div>';
          }

          var killBtn = (task.status === 'pending' || task.status === 'active')
            ? '<button class="kill-btn" data-kill-id="' + task.id + '">Kill</button>'
            : '';
          html += '<div class="feed-detail-actions"><button class="reply-btn" data-reply-id="' + task.id + '" data-reply-subject="' + escAttr(task.subject) + '">Reply</button>' + killBtn + '</div>';
          detail.innerHTML = html || '<span class="feed-detail-value">No additional details</span>';
        }).catch(function() {
          detail.innerHTML = '<span class="feed-detail-value" style="color:var(--error)">Failed to load</span>';
        });
      }

      detail.classList.add('open');
      el.setAttribute('aria-expanded', 'true');
    }

    function handleFeedItemKey(event, item) {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleDetail(item);
      }
    }

    // Reply button handler (delegated)
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.reply-btn');
      if (!btn) return;
      e.stopPropagation(); // Don't toggle the detail panel
      var taskId = btn.getAttribute('data-reply-id');
      var subject = btn.getAttribute('data-reply-subject') || '';
      startReply(taskId, subject);
    });

    // Kill button handler (delegated)
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.kill-btn');
      if (!btn) return;
      e.stopPropagation();
      var taskId = btn.getAttribute('data-kill-id');
      var reason = prompt('Reason for killing task #' + taskId + ':');
      if (!reason || !reason.trim()) return;
      btn.disabled = true;
      btn.textContent = 'Killing…';
      fetch('/api/tasks/' + taskId + '/kill', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: reason.trim() }),
      }).then(function(res) {
        if (!res.ok) throw new Error(res.statusText);
        flashFeedItem(parseInt(taskId, 10), 'failed');
      }).catch(function() {
        btn.disabled = false;
        btn.textContent = 'Kill';
        alert('Failed to kill task #' + taskId);
      });
    });

    var replyParentId = null;

    function startReply(taskId, subject) {
      replyParentId = parseInt(taskId, 10);
      var statusEl = document.getElementById('message-status');
      statusEl.textContent = 'Replying to #' + taskId + ': ' + subject.slice(0, 60);
      statusEl.className = 'message-status reply-context';
      prefillMessage('[re: #' + taskId + '] ');
    }

    function clearReplyContext() {
      replyParentId = null;
      var statusEl = document.getElementById('message-status');
      if (statusEl && statusEl.classList.contains('reply-context')) {
        statusEl.textContent = '';
        statusEl.className = 'message-status';
      }
    }

    function prependToFeed(task) {
      if (knownTaskIds.has(task.id)) return;
      knownTaskIds.add(task.id);

      var list = document.getElementById('feed-list');
      var placeholder = list.querySelector('.placeholder');
      if (placeholder) list.innerHTML = '';

      var temp = document.createElement('div');
      temp.innerHTML = buildFeedItemHTML(task);
      var item = temp.firstElementChild;
      item.classList.add('slide-in');
      list.insertBefore(item, list.firstChild);

      var count = document.getElementById('feed-count');
      var n = list.querySelectorAll('.feed-item').length;
      count.textContent = n + ' tasks';
    }

    function flashFeedItem(taskId, status) {
      var detail = document.querySelector('.feed-detail[data-task-id="' + taskId + '"]');
      if (!detail) return;

      var item = detail.closest('.feed-item');
      if (!item) return;

      var dot = item.querySelector('.status-dot');
      var badge = item.querySelector('.pill');
      var cls = statusBorderClass(status);

      item.className = 'feed-item ' + cls;
      if (status === 'completed') {
        item.classList.add('flash-green');
        if (dot) { dot.className = 'status-dot'; dot.style.background = 'var(--success)'; }
      } else if (status === 'failed') {
        item.classList.add('flash-red');
        if (dot) { dot.className = 'status-dot'; dot.style.background = 'var(--error)'; }
      }

      if (badge) {
        badge.className = statusBadgeClass(status);
        badge.textContent = status;
      }

      setTimeout(function() {
        item.classList.remove('flash-green', 'flash-red');
      }, 1600);

      detail.innerHTML = '<p class="placeholder">Loading...</p>';
      detail.classList.remove('open');
      item.setAttribute('aria-expanded', 'false');
    }

    function refreshFeed() {
      currentOffset = 0;
      fetchJSON(buildTasksUrl(0)).then(function(d) {
        var tasks = d.tasks || [];
        renderFeed(tasks, d.total || tasks.length, 0, false);
        tasks.forEach(function(t) { knownTaskIds.add(t.id); });
      }).catch(function() {});
    }

    function jumpToTask(event, taskId) {
      event.stopPropagation();
      var item = document.querySelector('[data-task-id-root="' + taskId + '"]');
      if (item) {
        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
        item.classList.add('flash-highlight');
        setTimeout(function() { item.classList.remove('flash-highlight'); }, 1200);
      } else {
        // Task not in current view — navigate with filter
        currentFilter = '';
        currentSearch = '#' + taskId;
        document.getElementById('feed-search').value = currentSearch;
        refreshFeed();
      }
    }

    // ---- Dispatch Metrics ----

    function renderMetrics(status, costs) {
      document.getElementById('metric-pending').textContent = String(status.pending);
      document.getElementById('metric-active').textContent = String(status.active);
      document.getElementById('metric-completed').textContent = String(status.completed_today);
      document.getElementById('metric-failed').textContent = String(status.failed_today);
      document.getElementById('metric-cost').textContent = formatCost(status.cost_today_usd);
      document.getElementById('metric-uptime').textContent = status.uptime_hours + 'h';

      if (status.last_cycle) {
        document.getElementById('metric-last-cycle').textContent = relativeTime(status.last_cycle.started_at);
      }
      updateDispatchGapBanner(status.last_cycle || null);

      // Avg duration from recent cycles
      fetchJSON('/api/cycles?limit=50').then(function(data) {
        var cycles = data.cycles.filter(function(c) { return c.duration_ms != null; });
        if (cycles.length > 0) {
          var avg = cycles.reduce(function(sum, c) { return sum + c.duration_ms; }, 0) / cycles.length;
          document.getElementById('metric-duration').textContent = formatDuration(avg);
        } else {
          document.getElementById('metric-duration').textContent = '--';
        }
      });

      // Cost bar chart
      var bars = document.getElementById('cost-bars');
      if (!costs || costs.length === 0) {
        bars.innerHTML = '<p class="placeholder">No cost data yet</p>';
        return;
      }

      var maxCost = Math.max.apply(null, costs.map(function(c) { return c.cost_usd; }));
      if (maxCost === 0) maxCost = 1;

      bars.innerHTML = costs.map(function(c) {
        var hour = c.hour.split(' ')[1] || c.hour;
        var pct = Math.round((c.cost_usd / maxCost) * 100);
        return '<div class="bar-row">'
          + '<span class="bar-label">' + hour.slice(0, 5) + '</span>'
          + '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>'
          + '<span class="bar-value">' + formatCost(c.cost_usd) + '</span>'
          + '</div>';
      }).join('');
    }

    // ---- SSE Callbacks ----

    sseCallbacks.onTaskCreated = function(task) {
      var matchesFilter = !currentFilter || currentFilter === task.status;
      var matchesSearch = !currentSearch || (task.subject || '').toLowerCase().includes(currentSearch.toLowerCase());
      if (matchesFilter && matchesSearch) prependToFeed(task);
    };

    sseCallbacks.onTaskCompleted = function(task) {
      flashFeedItem(task.id, 'completed');
    };

    sseCallbacks.onTaskFailed = function(task) {
      flashFeedItem(task.id, 'failed');
    };

    sseCallbacks.onCycleCompleted = function() {
      fetchJSON('/api/costs?range=day').then(function(c) {
        fetchJSON('/api/status').then(function(s) {
          renderMetrics(s, c.costs || []);
        });
      }).catch(function() {});
    };

    sseCallbacks.onRefreshAll = function() {
      fetchJSON('/api/status').then(function(s) {
        updateHeader(s);
        bumpCostTicker(s.cost_today_usd);
        fetchJSON('/api/costs?range=day').then(function(c) {
          renderMetrics(s, c.costs || []);
        });
      }).catch(function() {});
      // Only refresh if we're on page 1 (no load-more in progress)
      if (currentOffset === 0) refreshFeed();
    };

    // ---- Init ----

    async function init() {
      loadIdentity('Activity');
      try {
        var results = await Promise.allSettled([
          fetchJSON('/api/status'),
          fetchJSON(buildTasksUrl(0)),
          fetchJSON('/api/costs?range=day'),
        ]);

        var status     = results[0].status === 'fulfilled' ? results[0].value : null;
        var tasks      = results[1].status === 'fulfilled' ? results[1].value : null;
        var costs      = results[2].status === 'fulfilled' ? results[2].value : null;

        if (status) { updateHeader(status); renderMetrics(status, costs ? costs.costs : []); }
        if (tasks) {
          renderFeed(tasks.tasks || [], tasks.total || 0, 0, false);
          (tasks.tasks || []).forEach(function(t) { knownTaskIds.add(t.id); });
        }
      } catch (e) {
        console.error('Dashboard init error:', e);
      }

      // Filter tabs
      var filterTabsEl = document.getElementById('filter-tabs');
      filterTabsEl.addEventListener('click', function(e) {
        var btn = e.target.closest('.filter-tab');
        if (!btn) return;
        currentFilter = btn.getAttribute('data-status');
        filterTabsEl.querySelectorAll('.filter-tab').forEach(function(t) {
          t.classList.toggle('active', t === btn);
          t.setAttribute('aria-pressed', t === btn ? 'true' : 'false');
        });
        refreshFeed();
      });

      // Search
      var searchInput = document.getElementById('feed-search');
      var debouncedSearch = debounce(function() {
        currentSearch = searchInput.value.trim();
        refreshFeed();
      }, 300);
      searchInput.addEventListener('input', debouncedSearch);

      // Message box
      initMessageBox();

      // SSE
      connectSSE();

      // Periodic refresh
      setInterval(sseCallbacks.onRefreshAll, 60000);
    }

    init();
  </script>
</body>
</html>
