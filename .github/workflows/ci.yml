name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: TypeScript Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Validate TypeScript syntax
        run: bun scripts/check-syntax.ts
